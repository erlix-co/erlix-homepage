<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BCC Alert | Erlix</title>
    <meta
      name="description"
      content="BCC Alert by Erlix - prevent visible group email mistakes."
    />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem 1rem;
        font-family: "Rubik", sans-serif;
        color: #eff4ff;
        background:
          radial-gradient(circle at 12% 15%, rgba(53, 195, 255, 0.2), transparent 35%),
          radial-gradient(circle at 85% 12%, rgba(45, 140, 240, 0.25), transparent 42%),
          linear-gradient(150deg, #070f24 0%, #0d1f47 100%);
      }

      .card {
        width: min(880px, 100%);
        border: 1px solid rgba(95, 155, 255, 0.3);
        border-radius: 24px;
        background: rgba(8, 20, 46, 0.75);
        box-shadow: 0 24px 50px rgba(3, 8, 23, 0.45);
        padding: clamp(1.2rem, 3vw, 2rem);
        text-align: center;
      }

      .logo-wrap {
        border-radius: 28px;
        background: #fff;
        padding: clamp(1rem, 3vw, 1.4rem);
      }

      .logo-wrap img {
        width: min(100%, 720px);
        height: auto;
        display: block;
        margin: 0 auto;
      }

      h1 {
        margin: 1.2rem 0 0.5rem;
        font-size: clamp(1.3rem, 3.3vw, 2rem);
      }

      .construction {
        font-size: clamp(3rem, 9vw, 6rem);
        margin: 0.7rem 0 0;
        line-height: 1;
      }

      .status {
        margin: 0.25rem 0 0;
        color: #b6c7ea;
        font-size: clamp(1rem, 2.3vw, 1.25rem);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo-wrap">
        <img src="./BCC-Alert-logo.png" alt="BCC Alert logo" />
      </div>
      <h1>לחיצה קטנה - מבוכה גדולה. אפשר למנוע את זה!</h1>
      <div class="construction" aria-hidden="true">🏗️</div>
      <p class="status">בבניה</p>
    </main>
  </body>
</html>
